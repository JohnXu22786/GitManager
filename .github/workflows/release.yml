name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    # ── Phase 1: Build ──
    # Builds the binary for each target platform in parallel using a build matrix.
    # Each build runs independently on its own runner (ubuntu, windows, macos).
    # Artifacts are uploaded as workflow artifacts for the next phase.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev libxcb1-dev

      - name: Install macOS system dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          # macOS typically has required libraries, but ensure Xcode CLT
          xcode-select -p || xcode-select --install

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          ver="${tag#v}"
          echo "version=$ver" >> $GITHUB_OUTPUT

          # Update Cargo.toml version so the binary embeds the tag version
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "(Get-Content Cargo.toml) -replace '^version = \".*\"', 'version = \"$ver\"' | Set-Content Cargo.toml"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"$ver\"/" Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"$ver\"/" Cargo.toml
          fi

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        id: package
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          suffix="${{ matrix.artifact_suffix }}"

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            binary="target/${{ matrix.target }}/release/git_manager.exe"
            archive="git-manager-${version}-${suffix}.zip"
            7z a -tzip "$archive" "$binary"
          else
            binary="target/${{ matrix.target }}/release/git_manager"
            archive="git-manager-${version}-${suffix}.tar.gz"
            tar czf "$archive" -C "$(dirname "$binary")" "$(basename "$binary")"
          fi

          echo "archive=$archive" >> $GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-manager-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  upload-artifacts:
    name: Upload Artifacts to Release
    # ── Phase 2: Upload Artifacts to Existing Release ──
    # After ALL builds succeed, this job downloads all platform artifacts and
    # uploads them to the GitHub Release that the user created on the web UI.
    #
    # IMPORTANT: This does NOT create a new release. The user already created
    # the release on GitHub's web UI. This job only uploads the built binaries
    # to that existing release via tag_name matching.
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          ver="${tag#v}"
          echo "version=$ver" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: git-manager-${{ steps.version.outputs.version }}-*
          merge-multiple: true
          path: release-artifacts

      - name: List artifacts
        run: ls -lh release-artifacts/

      - name: Upload Artifacts to Existing Release
        uses: softprops/action-gh-release@v2
        with:
          name: Git Manager ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Git Manager v${{ steps.version.outputs.version }}

            A dedicated Git branch & worktree manager GUI built with Rust + egui.

            > **Note**: The Windows `.exe` uses `windows_subsystem = "windows"` (no console window).  
            > On Linux/macOS, run from terminal or create a desktop shortcut.

            ### Features
            - Branch management (create, rename, delete, switch, merge)
            - Worktree management (add, remove, prune)
            - Status & commit (stage/unstage, diff, commit, amend, uncommit)
            - Commit log viewer
            - Stash management
            - Push/Pull/Fetch with remotes
            - System dark/light theme following

            ### Assets
            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | x86_64 | `git-manager-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz` |
            | Linux | ARM64 | `git-manager-${{ steps.version.outputs.version }}-linux-aarch64.tar.gz` |
            | Windows | x86_64 | `git-manager-${{ steps.version.outputs.version }}-windows-x86_64.zip` |
            | macOS | Intel | `git-manager-${{ steps.version.outputs.version }}-macos-x86_64.tar.gz` |
            | macOS | Apple Silicon | `git-manager-${{ steps.version.outputs.version }}-macos-aarch64.tar.gz` |
          files: release-artifacts/*

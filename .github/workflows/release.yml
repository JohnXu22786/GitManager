name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Phase 1: Extract version once for all build jobs ──
  # Stroom pattern: a lightweight prepare job extracts the version and
  # exposes it as a job output that all platform jobs can reference.
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.extract-version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract-version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

  # ── Phase 2: Build + Upload per platform ──
  # Stroom pattern: each platform builds AND uploads its artifact directly
  # to the GitHub Release. No intermediate workflow artifacts.
  # No `body` or `name` is set, so the user's release notes are preserved.
  build:
    name: Build (${{ matrix.target }})
    needs: [prepare-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          # Download and install aarch64 OpenSSL for cross-compilation
          wget -qO- https://github.com/openssl/openssl/releases/download/openssl-3.0.15/openssl-3.0.15.tar.gz | sudo tar xz -C /opt
          pushd /opt/openssl-3.0.15
          CC=aarch64-linux-gnu-gcc ./Configure linux-aarch64 --prefix=/usr/aarch64-linux-gnu --libdir=lib
          make -j$(nproc) -s
          sudo make install_sw -s
          popd
          echo "AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev libxcb1-dev

      - name: Install macOS system dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          # macOS typically has required libraries, but ensure Xcode CLT
          xcode-select -p || xcode-select --install

      - name: Install OpenSSL for macOS cross-compilation (x86_64 on ARM64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          # Build OpenSSL from source for x86_64 (host is ARM64, target is x86_64)
          wget -qO- https://github.com/openssl/openssl/releases/download/openssl-3.0.15/openssl-3.0.15.tar.gz | tar xz
          cd openssl-3.0.15
          ./Configure darwin64-x86_64-cc no-zlib no-asm --prefix=/usr/local/openssl-x86_64
          make -j$(sysctl -n hw.ncpu) -s
          sudo make install_sw -s
          cd ..
          rm -rf openssl-3.0.15
          echo "OPENSSL_DIR=/usr/local/openssl-x86_64" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Set version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ needs.prepare-version.outputs.app_version }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "(Get-Content Cargo.toml) -replace '^version = \".*\"', 'version = \"$VERSION\"' | Set-Content Cargo.toml"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          fi

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        id: package
        shell: bash
        run: |
          VERSION="${{ needs.prepare-version.outputs.app_version }}"
          SUFFIX="${{ matrix.artifact_suffix }}"

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY="target/${{ matrix.target }}/release/git_manager.exe"
            ARCHIVE="git-manager-${VERSION}-${SUFFIX}.zip"
            7z a -tzip "$ARCHIVE" "$BINARY"
          else
            BINARY="target/${{ matrix.target }}/release/git_manager"
            ARCHIVE="git-manager-${VERSION}-${SUFFIX}.tar.gz"
            tar czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          fi

          echo "archive=$ARCHIVE" >> $GITHUB_OUTPUT

      # Stroom pattern: each platform uploads directly to the GitHub Release.
      # No `body` or `name` is set, so the release notes the user wrote
      # when creating the release on GitHub's web UI are preserved intact.
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.archive }}
